name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    # The dependency-free core, Guard, and Harness: lint, strict type-check, and the
    # full test suite. The eval tests that need AgentDojo skip here (importorskip), so
    # this job proves the library stands on its own with no heavyweight extras.
    name: core (lint, type-check, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy src
      - run: pytest

  eval:
    # The AgentDojo integration. Installs the eval extra so the adapter, transcript
    # replay, and measurement tests actually run -- all hermetic: they replay recorded
    # transcripts and never contact a model provider, so no API key is needed.
    name: eval (AgentDojo integration, hermetic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,eval]"
      - run: pytest

  langgraph:
    # The LangGraph adapter integration. Installs the langgraph extra so the
    # WardenToolNode end-to-end graph tests actually run instead of skipping
    # (importorskip) -- hermetic: the "model" is a scripted graph node, so no
    # provider is contacted and no API key is needed.
    name: langgraph (WardenToolNode integration, hermetic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,langgraph]"
      - run: pytest
